<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS | Login</title>
    
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <i class="fas fa-graduation-cap"></i> SMS
        </div>
        
        <ul class="sidebar-links">
            <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="login.html" class="active"><i class="fas fa-sign-in-alt"></i> Login</a></li>
            <li><a href="register.html"><i class="fas fa-user-plus"></i> Register</a></li>
            <li><a href="dashboard.html" id="dashboard-link" class="hidden"><i class="fas fa-chart-line"></i> Dashboard</a></li>
            <li><a href="students.html" id="students-link" class="hidden"><i class="fas fa-users"></i> Students</a></li>
            <li><a href="profile.html" id="profile-link" class="hidden"><i class="fas fa-user"></i> Profile</a></li>
        </ul>
        
        <div class="sidebar-footer">
            <a href="#" id="logout-link" class="hidden"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Login Section -->
        <section class="auth-section">
            <div class="auth-card">
                <h2>Welcome Back</h2>
                <p class="auth-card-subtitle" style="margin-bottom: 40px;">Sign in to continue to your dashboard</p>
                
                <form id="login-form">
                    <div class="form-group">
                        <label for="username"><i class="fas fa-user"></i> Username</label>
                        <input type="text" id="username" name="username" required placeholder="Enter your username">
                    </div>
                    
                    <div class="form-group">
                        <label for="password"><i class="fas fa-lock"></i> Password</label>
                        <input type="password" id="password" name="password" required placeholder="Enter your password">
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>
                </form>
                
                <p class="auth-redirect">
                    Don't have an account? <a href="register.html">Create one now</a>
                </p>
            </div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
